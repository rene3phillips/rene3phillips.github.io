<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your cart on 90s Replay - View and manage the products you added.">
    <title>Shopping Cart - 90s Replay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="div1">
                <a href="index.html" class="name">90s Replay</a>
            </div>
            <div class="div2">
                <h1>Shopping Cart</h1>
            </div>
            <div class="div3">
                <a href="shop.html">Shop</a>
            </div>
        </nav>
    </header>

    <main>
        <section id="cart-container">
            <div id="cart-items"></div>
            <div id="cart-summary">
                <h2>Summary</h2>
                <p id="total-price">Total: $0.00</p>
                <button id="checkout-button">Checkout</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer">
            <p class="name-footer">90s Replay</p>
            <p class="text-footer">✨ 90s kid energy, no time machine needed.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
