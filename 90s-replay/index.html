<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Basic Metadata -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Page Title -->
        <title>90sReplay - Shop</title>

        <!-- Description for SEO -->
        <meta 
            name="description" 
            content="Shop 90s Replay for retro games, toys, and collectibles! 
            Rediscover 90s nostalgia with unique products inspired by the iconic decade. 
            Perfect for 90s fans!" 
        >

        <!-- Google Font: Tourney -->
        <link 
            href="https://fonts.googleapis.com/css2?family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" 
            rel="stylesheet"
        >

        <!-- CSS Stylesheets -->
        <link rel="stylesheet" href="styles/shared.css">
        <link rel="stylesheet" href="styles/index.css">
    </head>

    <body>
        <!-- HEADER WITH NAVIGATION BAR -->
        <header>
            <nav class="navbar">
                <!-- Search Section -->
                <div class="navbar-section">
                    <a href="search.html">
                        <img 
                            src="images/icons/search.jpeg"
                            alt="Search icon"
                            class="icon"
                        >
                    </a>
                </div>

                <!-- Website Branding -->
                <div class="navbar-brand">
                    <a href="index.html" class="name">
                        90's<br>Replay
                    </a>
                </div>

                <!-- User Actions: Login and Cart -->
                <div class="navbar-actions">
                    <a href="login.html">
                        <img 
                            src="images/icons/login.jpeg"
                            alt="Login icon"
                            class="icon"
                        >
                    </a>
                    <a href="cart.html">
                        <img 
                            src="images/icons/cart.png"
                            alt="Cart icon"
                            class="icon" 
                        >
                    </a>
                </div>
            </nav>
        </header>

        <!-- MAIN CONTENT -->
        <main>
            <!-- Product Container -->
            <section class="products" id="product-container" aria-label="Product Listings">
                <!-- Product elements generated dynamically with JavaScript -->
            </section>
        </main>
        
         <!-- FOOTER -->
         <footer class="footer">
            <div class="footer-content">

                <!-- Brand Name -->
                <div class="footer-name">
                    90's<br>Replay
                </div>

                <!-- Catchphrase -->
                <div class="footer-text">
                    ✨ 90s kid energy, no time machine needed.
                </div>
            </div>
        </footer>

        <!-- JavaScript -->
        <script type="module" src="scripts/index.js"></script>
    </body>
</html>
