<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page Title -->
    <title>90's Replay - Product Description</title>

    <!-- Description for SEO -->
    <meta
      name="description"
      content="Explore detailed product descriptions for retro games, toys, and collectibles at 90s Replay. 
      Relive the nostalgia of the 90s with exclusive items that every 90s fan will love!"
    >

    <!-- Google Font: Tourney -->
    <link 
        href="https://fonts.googleapis.com/css2?family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" 
        rel="stylesheet"
    >

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/product-detail.css">
  </head>

  <body>
    <!-- HEADER WITH NAVIGATION BAR -->
    <header>
      <nav class="navbar">
        <!-- Search Section -->
        <div class="navbar-section">
          <a href="search.html">
              <img 
                  src="images/icons/search.jpeg"
                  alt="Search icon"
                  class="icon"
              >
          </a>
        </div>

        <!-- Website Branding -->
        <div class="navbar-brand">
          <a href="index.html" class="name">
              90's<br>Replay
          </a>
        </div>

        <!-- User Actions: Login and Cart -->
        <div class="navbar-actions">
          <a href="login.html">
              <img 
                  src="images/icons/login.jpeg"
                  alt="Login icon"
                  class="icon"
              >
          </a>
          <a href="cart.html">
              <img 
                  src="images/icons/cart.png"
                  alt="Cart icon"
                  class="icon" 
              >
          </a>
        </div>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <div class="product-detail" id="product-detail-container" aria-label="Product Details">
        <!-- Product details will be dynamically rendered here -->
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-content">

        <!-- Brand Name -->
        <div class="footer-name">
          90's<br>Replay
        </div>

        <!-- Catchphrase -->
        <div class="footer-text">
          ✨ 90s kid energy, no time machine needed.
        </div>
      </div>
      </footer>

    <!-- JS -->
    <script type="module" src="scripts/product-detail.js"></script>
  </body>
</html>
