<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">

        <title>Natasha R. Phillips - Weather App</title>

        <!-- Responsive Design (width & zoom)-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Cascading Style Sheets -->
        <link rel="stylesheet" href="styles/weather-app.css">  
        <link rel="stylesheet" href="styles/shared.css">    
    </head>

    <body>
        <!-- NAV BAR -->
        <nav class="navbar">
            <a class="navbar-link" href="index.html">About</a>
            <a class="navbar-link" href="projects.html">Projects</a>
            <a class="navbar-link" href="skills.html">Skills</a>
            <a class="navbar-link" href="contact.html">Contact</a>         
        </nav>
    
        <!-- BODY -->      
        <div class="card">
            <div class="search">
                <input type="text" placeholder="enter city name" spellcheck="false">
                <button><img src="images/weather-app/search.png"></button>
            </div>
            <div class="error">
                <p>Invalid city name</p>
            </div>
            <div class="weather">
                <img src="images/weather-app/rain.png" class="weather-icon">
                <h1 class="temp"></h1>
                <h2 class="city"></h2>
                <div class="details">
                    <div class="col">
                        <img src="images/weather-app/humidity.png">
                        <div>
                            <p class="humidity"></p>
                            <p>Humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <img src="images/weather-app/wind.png">
                        <div>
                            <p class="wind"></p>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
     
        <!-- FOOTER -->  
        <div class="footer">
            Last Update: October 2024 &nbsp;
        </div>

        <script src="scripts/weather-app.js"></script>

    </body>

</html>
